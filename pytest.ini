# pytest.ini — copilot suite configuration (repo root)
#
# This file scopes pytest for the copilot's own tests only.
# It intentionally omits --cov so the vendored claude_monitor coverage gate
# (defined in tests/tui/pyproject.toml [tool.pytest.ini_options]) does not
# apply when running copilot tests.
#
# Canonical copilot test command:
#   pytest tests/test_skill_frontmatter.py tests/test_parser_unit.py tests/test_ff6_negative.py -p no:cov
#
# Or to run all copilot tests (excluding tui/):
#   pytest tests/ --ignore=tests/tui -p no:cov
[pytest]
addopts = -p no:cov
